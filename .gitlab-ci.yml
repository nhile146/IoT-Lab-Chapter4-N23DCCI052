stages:
  - lint
  - test
  - verify

lint-job:
  stage: lint
  image: python:3.11
  script:
    - pip install flake8
    - flake8 . --max-line-length=120 || echo "Lint errors ignored"

test-job:
  stage: test
  image: python:3.11
  script:
    - pip install psutil matplotlib
    - cd BT2_QEMU_SensorSim && python sensor_sim.py

verify-job:
  stage: verify
  image: python:3.11
  script:
    - test -f BT1_QEMU_SystemMonitor/system_monitor.py
    - test -f BT2_QEMU_SensorSim/sensor_sim.py
    - echo "All files verified!"
